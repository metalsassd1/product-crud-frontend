<aside class="sidebar">
  <div class="sidebar-header">
    <span class="brand">{{ title }}</span>
  </div>

  <div class="sidebar-content">
    <div class="nav-links">
      <!-- 🎯 วนลูปสร้างรายการเมนูเปลี่ยนหน้า -->
      @for (link of links; track link.navLabel) {
        @if (!link.adminOnly || isAdmin) {
          <button class="nav-item" (click)="goToPage(link.navPath)">
            {{ link.navLabel }}
          </button>
        }
      }
    </div>

    @if (isAdmin) {
      <div class="sidebar-administrator">
        <span class="admin-label">ผู้ดูแลระบบ (Admin)</span>
      </div>
    }
  </div>
</aside>
